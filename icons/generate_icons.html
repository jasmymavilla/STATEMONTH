<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Generate STATEMONTH Icons</title>
<style>
  body { background:#111; color:#f5f0e8; font-family:monospace; padding:20px; }
  canvas { border:1px solid #333; margin:8px; }
  button { background:#f5f0e8; color:#111; border:none; padding:10px 20px;
           font-family:monospace; font-size:14px; cursor:pointer; margin-top:16px; display:block; }
</style>
</head>
<body>
<h2>STATEMONTH — Icon Generator</h2>
<p>Click the button to auto-download all 3 icon sizes into this folder.</p>
<div id="canvases"></div>
<button id="dlBtn">⬇ Download All Icons</button>

<script>
function drawIcon(size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const s = size;

  // Background
  ctx.fillStyle = '#111111';
  ctx.fillRect(0, 0, s, s);

  // Receipt paper
  const px = s * 0.14, pw = s - px * 2;
  const py = s * 0.08, ph = s * 0.68;

  ctx.fillStyle = '#f5f0e8';
  ctx.beginPath();
  ctx.roundRect(px, py, pw, ph, s * 0.03);
  ctx.fill();

  // Wavy bottom of receipt
  ctx.fillStyle = '#111111';
  ctx.beginPath();
  const wy = py + ph;
  ctx.moveTo(px, wy);
  const segs = 4, sw = pw / segs;
  for (let i = 0; i < segs; i++) {
    ctx.quadraticCurveTo(px + sw * (i + 0.5), wy + s * 0.05, px + sw * (i + 1), wy);
  }
  ctx.lineTo(px + pw, s);
  ctx.lineTo(px, s);
  ctx.closePath();
  ctx.fill();

  // Receipt lines (decoration)
  ctx.fillStyle = '#1a1a1a';
  const lineH = s * 0.03, lineW = pw * 0.6, lineX = px + pw * 0.2;
  const lineY1 = py + s * 0.12, lineY2 = lineY1 + s * 0.08, lineY3 = lineY2 + s * 0.08;
  [lineY1, lineY2, lineY3].forEach(ly => {
    ctx.fillStyle = '#1a1a1a';
    ctx.globalAlpha = 0.25;
    ctx.fillRect(lineX, ly, lineW, lineH);
    ctx.globalAlpha = 1;
  });

  // Dollar sign
  ctx.fillStyle = '#1a1a1a';
  ctx.font = `bold ${s * 0.28}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('$', s / 2, py + ph * 0.45);

  return c;
}

const sizes = [16, 48, 128];
const wrap = document.getElementById('canvases');

sizes.forEach(sz => {
  const c = drawIcon(sz);
  c.title = `icon${sz}.png`;
  wrap.appendChild(c);
  const lbl = document.createElement('span');
  lbl.style.cssText = 'color:#888;font-size:11px;margin-right:16px;';
  lbl.textContent = `${sz}×${sz}`;
  wrap.appendChild(lbl);
});

document.getElementById('dlBtn').addEventListener('click', () => {
  sizes.forEach((sz, i) => {
    const c = drawIcon(sz);
    setTimeout(() => {
      const a = document.createElement('a');
      a.download = `icon${sz}.png`;
      a.href = c.toDataURL('image/png');
      a.click();
    }, i * 200);
  });
});
</script>
</body>
</html>
